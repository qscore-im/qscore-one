<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Qscore Scorekeeper</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0c0c10;
      --surface:  #16161c;
      --surface2: #222230;
      --border:   #2e2e3e;
      --a:        #ff4f1f;
      --b:        #00c2d1;
      --text:     #efefef;
      --muted:    #8888a8;
      --green:    #2ecc71;
    }

    html, body {
      height: 100dvh;
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Sans', sans-serif;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }
    body { display: flex; flex-direction: column; }

    /* ── Shared header ── */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px;
      background: var(--surface); border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .header-logo { height: 28px; cursor: pointer; }
    .hdr-btn {
      background: var(--surface2); border: 1px solid var(--border); color: var(--muted);
      padding: 6px 13px; border-radius: 6px; font-size: 12px; font-weight: 600;
      letter-spacing: 0.06em; font-family: inherit; cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .hdr-btn:hover { color: var(--text); border-color: var(--muted); }
    .conn-dot { width: 6px; height: 6px; border-radius: 50%; background: #444; transition: background 0.4s; }
    .conn-dot.live { background: var(--green); }

    /* ── Views ── */
    .view { flex: 1; overflow-y: auto; display: none; flex-direction: column; }
    .view.active { display: flex; }

    /* ── Match list view ── */
    .list-toolbar {
      display: flex; flex-wrap: wrap; gap: 8px; padding: 10px 12px;
      background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .filter-select, .filter-input {
      background: var(--surface2); border: 1px solid var(--border); color: var(--text);
      padding: 5px 9px; border-radius: 6px; font-size: 12px; font-family: inherit;
      outline: none;
    }
    .filter-select:focus, .filter-input:focus { border-color: var(--muted); }
    .filter-input { flex: 1; min-width: 120px; }

    .match-list { flex: 1; overflow-y: auto; padding: 10px 12px; display: flex; flex-direction: column; gap: 8px; }

    .match-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
      padding: 12px 14px; cursor: pointer; transition: border-color 0.2s, background 0.2s;
    }
    .match-card:hover { border-color: var(--muted); background: var(--surface2); }
    .match-card-top {
      display: flex; justify-content: space-between; align-items: flex-start; gap: 8px;
    }
    .match-teams { font-size: 15px; font-weight: 700; letter-spacing: 0.04em; }
    .match-set-score { font-family: 'IBM Plex Mono', monospace; font-size: 18px; font-weight: 700; color: var(--text); }
    .match-meta { margin-top: 5px; font-size: 11px; color: var(--muted); display: flex; gap: 10px; flex-wrap: wrap; }
    .match-status-badge {
      display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 10px;
      font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
    }
    .badge-not-started { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
    .badge-in-progress { background: rgba(46,204,113,0.15); color: var(--green); border: 1px solid rgba(46,204,113,0.3); }
    .badge-complete    { background: rgba(136,136,168,0.15); color: var(--muted); border: 1px solid var(--border); }

    .empty-state {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 10px; color: var(--muted); padding: 40px;
    }
    .empty-icon { height: 120px; width: auto; display: block; margin: 0 auto; }
    .empty-text { font-size: 14px; text-align: center; }

    .fab {
      position: fixed; bottom: 24px; right: 20px;
      width: 56px; height: 56px; border-radius: 50%;
      background: var(--a); color: #fff; border: none;
      font-size: 28px; font-weight: 400; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px rgba(255,79,31,0.4); transition: transform 0.1s, opacity 0.1s;
      z-index: 50;
    }
    .fab:active { transform: scale(0.93); opacity: 0.85; }

    /* ── Match detail panel (in match-list view) ── */
    .detail-panel {
      position: fixed; inset: 0; background: rgba(8,8,14,0.93);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 12px; z-index: 80; opacity: 0; pointer-events: none;
      transition: opacity 0.25s; backdrop-filter: blur(4px);
    }
    .detail-panel.show { opacity: 1; pointer-events: all; }
    .detail-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
      padding: 20px; width: min(90vw, 380px); display: flex; flex-direction: column; gap: 12px;
    }
    .detail-title { font-size: 18px; font-weight: 700; }
    .detail-scores { font-family: 'IBM Plex Mono', monospace; font-size: 36px; font-weight: 700; text-align: center; }
    .detail-meta { font-size: 12px; color: var(--muted); display: flex; flex-direction: column; gap: 4px; }
    .detail-btns { display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }
    .detail-btn {
      padding: 13px; border-radius: 10px; font-size: 13px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase; font-family: inherit;
      cursor: pointer; border: 1px solid var(--border); transition: opacity 0.15s;
    }
    .detail-btn:active { opacity: 0.7; }
    .btn-start   { background: var(--green); color: #000; border-color: var(--green); }
    .btn-resume  { background: var(--surface2); color: var(--text); }
    .btn-delete  { background: transparent; color: var(--muted); }
    .btn-cancel  { background: transparent; color: var(--muted); font-size: 12px; }

    /* ── Scorer view ── */
    .scorer-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px;
      background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .scorer-set-info { text-align: center; }
    .set-badge { font-size: 12px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
    .set-badge span { color: var(--text); }
    .target-info { font-size: 11px; color: var(--muted); }
    .btn-back {
      background: var(--surface2); border: 1px solid var(--border); color: var(--muted);
      padding: 6px 13px; border-radius: 6px; font-size: 12px; font-weight: 600;
      font-family: inherit; cursor: pointer;
    }

    .court { flex: 1; display: flex; overflow: hidden; }
    .court.swapped { flex-direction: row-reverse; }
    .team-panel {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      padding: 14px 10px 10px; gap: 10px; position: relative; transition: background 0.3s;
    }
    .team-panel::after {
      content: ''; position: absolute; top: 0; left: 0; right: 0;
      height: 3px; opacity: 0; transition: opacity 0.3s;
    }
    .team-panel.a               { border-right: 1px solid var(--border); }
    .court.swapped .team-panel.a { border-right: none; border-left: 1px solid var(--border); }
    .team-panel.a::after { background: var(--a); }
    .team-panel.b::after { background: var(--b); }
    .team-panel.serving::after { opacity: 1; }
    .team-panel.serving { background: rgba(255,255,255,0.015); }

    .name-row { display: flex; align-items: center; gap: 7px; }
    .serve-pip { width: 7px; height: 7px; border-radius: 50%; opacity: 0; transition: opacity 0.3s; flex-shrink: 0; }
    .serving .serve-pip { opacity: 1; }
    .team-panel.a .serve-pip { background: var(--a); }
    .team-panel.b .serve-pip { background: var(--b); }
    .team-name-lbl {
      font-size: 13px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
      cursor: pointer; border-bottom: 1px dashed transparent; transition: border-color 0.2s;
      background: none; border-top: none; border-left: none; border-right: none;
      padding: 0; font-family: inherit;
    }
    .team-panel.a .team-name-lbl { color: var(--a); }
    .team-panel.b .team-name-lbl { color: var(--b); }
    .team-name-lbl:hover { border-bottom-color: currentColor; }

    .name-input {
      font-size: 13px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
      font-family: 'IBM Plex Sans', sans-serif; background: transparent;
      border: none; border-bottom: 2px solid currentColor; outline: none;
      width: 90px; text-align: center; padding: 0 2px;
    }
    .team-panel.a .name-input { color: var(--a); }
    .team-panel.b .name-input { color: var(--b); }

    .score-num {
      font-family: 'IBM Plex Mono', monospace;
      font-size: clamp(72px, 18vw, 96px); font-weight: 700; line-height: 1; color: var(--text);
    }
    .score-num.bump { animation: bump 0.22s ease; }
    @keyframes bump { 0%{transform:scale(1)} 45%{transform:scale(1.14)} 100%{transform:scale(1)} }

    .btn-plus {
      width: 100%; flex: 1; border: none; border-radius: 14px; font-size: 40px; font-weight: 700;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: transform 0.1s, opacity 0.1s; user-select: none;
    }
    .team-panel.a .btn-plus { background: var(--a); color: #fff; }
    .team-panel.b .btn-plus { background: var(--b); color: #fff; }
    .btn-plus:active { transform: scale(0.95); opacity: 0.8; }

    .btn-minus {
      width: 100%; padding: 11px; border: 1px solid var(--border); border-radius: 10px;
      background: var(--surface); color: var(--muted); font-size: 20px; cursor: pointer;
      font-family: inherit; transition: background 0.15s, color 0.15s; user-select: none;
    }
    .btn-minus:active { background: var(--surface2); color: var(--text); }

    .sets-row { display: flex; gap: 5px; }
    .set-pip-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--border); transition: background 0.3s; }
    .team-panel.a .set-pip-dot.won { background: var(--a); }
    .team-panel.b .set-pip-dot.won { background: var(--b); }
    .set-hist { font-size: 10px; color: var(--muted); letter-spacing: 0.06em; min-height: 14px; }

    .scorer-footer {
      display: flex; gap: 8px; padding: 10px 12px;
      background: var(--surface); border-top: 1px solid var(--border); flex-shrink: 0;
    }
    .footer-btn {
      flex: 1; padding: 13px; border-radius: 10px; font-size: 12px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase; font-family: inherit;
      cursor: pointer; border: 1px solid var(--border); transition: opacity 0.15s;
    }
    .footer-btn:active { opacity: 0.7; }
    .btn-next-set { background: var(--surface2); color: var(--text); }
    .btn-swap     { background: transparent; color: var(--muted); flex: 0.6; }
    .btn-end-match { background: transparent; color: var(--muted); }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      background: var(--surface2); border: 1px solid var(--border); color: var(--text);
      padding: 9px 18px; border-radius: 8px; font-size: 13px; font-weight: 500;
      opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; z-index: 200;
    }
    .toast.show { opacity: 1; }

    /* ── Set/Match overlay ── */
    .overlay {
      position: fixed; inset: 0; background: rgba(8,8,14,0.92);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 10px; z-index: 150; opacity: 0; pointer-events: none;
      transition: opacity 0.4s; backdrop-filter: blur(4px);
    }
    .overlay.show { opacity: 1; pointer-events: all; }
    .ov-label  { font-size: 11px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); }
    .ov-winner { font-size: 32px; font-weight: 700; letter-spacing: 0.05em; text-align: center; }
    .ov-score  { font-family: 'IBM Plex Mono', monospace; font-size: 18px; color: var(--muted); }
    .ov-btn {
      margin-top: 16px; padding: 14px 36px; border-radius: 12px;
      background: var(--surface2); border: 1px solid var(--border); color: var(--text);
      font-size: 13px; font-weight: 700; font-family: inherit;
      letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer;
    }

    /* ── New Match dialog ── */
    .dialog-backdrop {
      position: fixed; inset: 0; background: rgba(8,8,14,0.92);
      display: flex; align-items: center; justify-content: center;
      z-index: 200; opacity: 0; pointer-events: none;
      transition: opacity 0.25s; backdrop-filter: blur(4px);
    }
    .dialog-backdrop.show { opacity: 1; pointer-events: all; }
    .dialog {
      background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
      padding: 20px; width: min(92vw, 380px); display: flex; flex-direction: column; gap: 14px;
    }
    .dialog h2 { font-size: 16px; font-weight: 700; }
    .field-group { display: flex; flex-direction: column; gap: 5px; }
    .field-label { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
    .field-input {
      background: var(--surface2); border: 1px solid var(--border); color: var(--text);
      padding: 9px 11px; border-radius: 7px; font-size: 14px; font-family: inherit; outline: none;
    }
    .field-input:focus { border-color: var(--muted); }
    .dialog-btns { display: flex; gap: 8px; margin-top: 4px; }
    .btn-create {
      flex: 1; padding: 13px; border-radius: 10px; font-size: 13px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase; font-family: inherit;
      cursor: pointer; background: var(--a); color: #fff; border: none;
    }
    .btn-dialog-cancel {
      padding: 13px 18px; border-radius: 10px; font-size: 13px; font-weight: 700;
      font-family: inherit; cursor: pointer; background: transparent;
      color: var(--muted); border: 1px solid var(--border);
    }

    /* ── Misc ── */
    .sr-only {
      position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0;
    }
    .copyright {
      position: fixed; bottom: 6px; left: 10px;
      font-size: 9px; color: var(--muted); opacity: 0.5; pointer-events: none; z-index: 300;
    }
  </style>
</head>
<body>

  <!-- ══ LIST VIEW ══════════════════════════════════════════════════════════ -->
  <div id="view-list" class="view active" style="overflow:hidden;">

    <header class="header">
      <img src="Qscore logo plain.svg" alt="Qscore" class="header-logo">
      <div style="display:flex;align-items:center;gap:10px;">
        <div class="conn-dot" id="conn-dot" aria-label="Disconnected"></div>
      </div>
    </header>

    <div class="list-toolbar">
      <select class="filter-select" id="filter-status" onchange="applyFilters()">
        <option value="">All statuses</option>
        <option value="not-started">Not started</option>
        <option value="in-progress">In progress</option>
        <option value="complete">Complete</option>
      </select>
      <select class="filter-select" id="filter-date" onchange="applyFilters()">
        <option value="">All dates</option>
        <option value="today">Today</option>
      </select>
      <select class="filter-select" id="filter-sort" onchange="applyFilters()">
        <option value="time-desc">Newest first</option>
        <option value="time-asc">Oldest first</option>
      </select>
      <input class="filter-input" id="filter-text" type="search" placeholder="Search team or venue…" oninput="applyFilters()">
    </div>

    <div class="match-list" id="match-list">
      <div class="empty-state" id="empty-state" style="display:none;">
        <img class="empty-icon" src="Qscore logo.png" alt="">
        <div class="empty-text">No matches yet.<br>Tap + to create one.</div>
      </div>
    </div>

    <button class="fab" onclick="openNewMatchDialog()" aria-label="New match">+</button>
  </div>

  <!-- ══ SCORER VIEW ════════════════════════════════════════════════════════ -->
  <div id="view-scorer" class="view" style="overflow:hidden;">

    <header class="scorer-header">
      <button class="btn-back" onclick="pauseToList()" aria-label="Return to match list">← List</button>
      <div class="scorer-set-info">
        <div class="set-badge">SET <span id="set-num">1</span></div>
        <div class="target-info" id="target-label">First to 25 (win by 2)</div>
      </div>
      <div class="conn-dot" id="conn-dot-scorer" aria-label="Disconnected"></div>
    </header>

    <div class="court" id="court">
      <div class="team-panel a" id="panel-a">
        <div class="name-row">
          <div class="serve-pip" aria-hidden="true"></div>
          <button class="team-name-lbl" id="name-a" onclick="editName('A')" aria-label="Team A — tap to edit name">TEAM A</button>
        </div>
        <div class="score-num" id="score-a" aria-label="Team A score: 0">0</div>
        <button class="btn-plus" onclick="addPoint('A')" aria-label="Add point for Team A">+</button>
        <button class="btn-minus" onclick="removePoint('A')" aria-label="Remove point from Team A">−</button>
        <div class="sets-row" id="sets-a"></div>
        <div class="set-hist" id="hist-a"></div>
      </div>
      <div class="team-panel b" id="panel-b">
        <div class="name-row">
          <div class="serve-pip" aria-hidden="true"></div>
          <button class="team-name-lbl" id="name-b" onclick="editName('B')" aria-label="Team B — tap to edit name">TEAM B</button>
        </div>
        <div class="score-num" id="score-b" aria-label="Team B score: 0">0</div>
        <button class="btn-plus" onclick="addPoint('B')" aria-label="Add point for Team B">+</button>
        <button class="btn-minus" onclick="removePoint('B')" aria-label="Remove point from Team B">−</button>
        <div class="sets-row" id="sets-b"></div>
        <div class="set-hist" id="hist-b"></div>
      </div>
    </div>

    <footer class="scorer-footer">
      <button class="footer-btn btn-next-set"   onclick="nextSet()">Next Set</button>
      <button class="footer-btn btn-swap"        onclick="swapTeams()" aria-label="Swap team sides">⇄ Swap</button>
      <button class="footer-btn btn-end-match"   onclick="endMatch()">End Match</button>
    </footer>
  </div>

  <!-- ══ MATCH DETAIL PANEL ════════════════════════════════════════════════ -->
  <div class="detail-panel" id="detail-panel">
    <div class="detail-card">
      <div class="detail-title" id="detail-title">Match</div>
      <div class="detail-scores" id="detail-scores">0 : 0</div>
      <div class="detail-meta" id="detail-meta"></div>
      <div class="detail-btns" id="detail-btns"></div>
      <button class="detail-btn btn-cancel" onclick="closeDetail()">Cancel</button>
    </div>
  </div>

  <!-- ══ NEW MATCH DIALOG ═══════════════════════════════════════════════════ -->
  <div class="dialog-backdrop" id="dialog-new">
    <div class="dialog">
      <h2>New Match</h2>
      <div class="field-group">
        <label class="field-label" for="inp-venue">Venue</label>
        <input class="field-input" id="inp-venue" type="text" value="Here" maxlength="60">
      </div>
      <div class="field-group">
        <label class="field-label" for="inp-team-a">Team A</label>
        <input class="field-input" id="inp-team-a" type="text" value="Team A" maxlength="30">
      </div>
      <div class="field-group">
        <label class="field-label" for="inp-team-b">Team B</label>
        <input class="field-input" id="inp-team-b" type="text" value="Team B" maxlength="30">
      </div>
      <div class="field-group">
        <label class="field-label" for="inp-time">Date &amp; Time</label>
        <input class="field-input" id="inp-time" type="datetime-local">
      </div>
      <div class="dialog-btns">
        <button class="btn-dialog-cancel" onclick="closeNewMatchDialog()">Cancel</button>
        <button class="btn-create" onclick="createMatch()">Create Match</button>
      </div>
    </div>
  </div>

  <!-- ══ SET/MATCH OVERLAY ══════════════════════════════════════════════════ -->
  <div class="overlay" id="overlay" role="dialog" aria-modal="true">
    <div class="ov-label"  id="ov-label">Set Won!</div>
    <div class="ov-winner" id="ov-winner">Team A</div>
    <div class="ov-score"  id="ov-score">25 – 20</div>
    <button class="ov-btn" id="ov-btn">Next Set</button>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite" aria-atomic="true"></div>

  <div class="copyright">©2026 W. Brian Quinn, all rights reserved</div>

  <script src="js/app-config.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/backend.js"></script>
  <script>
  /* ── Constants ─────────────────────────────────────────────────── */
  const SETS_TO_WIN = 3;

  /* ── State ─────────────────────────────────────────────────────── */
  let allMatches   = {};   // id → matchState (from backend)
  let activeId     = null; // match being scored
  let matchState   = null; // snapshot of active match
  let overlayOpen  = false;
  let detailId     = null;
  let toastTimer   = null;
  let prevA = -1, prevB = -1;

  /* ── Backend ────────────────────────────────────────────────────── */
  window.addEventListener('backend:ready', () => {
    backend.onConnect(() => {
      document.querySelectorAll('.conn-dot').forEach(d => {
        d.classList.add('live'); d.setAttribute('aria-label', 'Connected');
      });
    });
    backend.onDisconnect(() => {
      document.querySelectorAll('.conn-dot').forEach(d => {
        d.classList.remove('live'); d.setAttribute('aria-label', 'Disconnected');
      });
    });
    backend.onMatches(data => {
      allMatches = data || {};
      // Update active match state if we're scoring
      if (activeId && allMatches[activeId]) {
        matchState = allMatches[activeId];
        renderScorer(matchState);
      }
      renderList();
    });
  });

  /* ── Match helpers ──────────────────────────────────────────────── */
  function matchStatus(m) {
    if (m.matchOver) return 'complete';
    if (m.started)   return 'in-progress';
    return 'not-started';
  }

  function setScore(m) {
    return `${m.teamA?.sets ?? 0}:${m.teamB?.sets ?? 0}`;
  }

  function formatDT(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    return d.toLocaleString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
  }

  function isToday(iso) {
    if (!iso) return false;
    const d = new Date(iso), now = new Date();
    return d.getFullYear() === now.getFullYear() &&
           d.getMonth()    === now.getMonth()    &&
           d.getDate()     === now.getDate();
  }

  /* ── List rendering ─────────────────────────────────────────────── */
  function applyFilters() {
    const statusF = document.getElementById('filter-status').value;
    const dateF   = document.getElementById('filter-date').value;
    const sortF   = document.getElementById('filter-sort').value;
    const textF   = document.getElementById('filter-text').value.toLowerCase().trim();

    let list = Object.values(allMatches);

    if (statusF)  list = list.filter(m => matchStatus(m) === statusF);
    if (dateF === 'today') list = list.filter(m => isToday(m.scheduledAt));
    if (textF)    list = list.filter(m =>
      m.teamA?.name?.toLowerCase().includes(textF) ||
      m.teamB?.name?.toLowerCase().includes(textF) ||
      m.venue?.toLowerCase().includes(textF)
    );

    list.sort((a, b) => {
      const ta = new Date(a.scheduledAt || 0).getTime();
      const tb = new Date(b.scheduledAt || 0).getTime();
      return sortF === 'time-asc' ? ta - tb : tb - ta;
    });

    renderMatchList(list);
  }

  function renderList() {
    applyFilters();
  }

  function renderMatchList(list) {
    const container = document.getElementById('match-list');
    const empty     = document.getElementById('empty-state');

    // Remove existing cards (keep empty-state node)
    Array.from(container.children).forEach(c => {
      if (c !== empty) c.remove();
    });

    if (list.length === 0) {
      empty.style.display = 'flex';
      return;
    }
    empty.style.display = 'none';

    list.forEach(m => {
      const card = document.createElement('div');
      card.className = 'match-card';
      card.setAttribute('role', 'button');
      card.setAttribute('tabindex', '0');
      card.onclick = () => openDetail(m.id);
      card.onkeydown = e => { if (e.key === 'Enter' || e.key === ' ') openDetail(m.id); };

      const status = matchStatus(m);
      const badgeCls = status === 'not-started' ? 'badge-not-started'
                     : status === 'in-progress'  ? 'badge-in-progress'
                     : 'badge-complete';
      const badgeTxt = status === 'not-started' ? 'Not started'
                     : status === 'in-progress'  ? 'In progress'
                     : 'Complete';

      card.innerHTML = `
        <div class="match-card-top">
          <div>
            <div class="match-teams">${esc(m.teamA?.name || 'Team A')} vs ${esc(m.teamB?.name || 'Team B')}</div>
            <div class="match-meta">
              <span>${esc(m.venue || '')}</span>
              <span>${formatDT(m.scheduledAt)}</span>
            </div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;">
            <div class="match-set-score">${setScore(m)}</div>
            <span class="match-status-badge ${badgeCls}">${badgeTxt}</span>
          </div>
        </div>
      `;
      container.appendChild(card);
    });
  }

  function esc(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  /* ── Detail panel ────────────────────────────────────────────────── */
  function openDetail(id) {
    const m = allMatches[id];
    if (!m) return;
    detailId = id;

    document.getElementById('detail-title').textContent =
      `${m.teamA?.name || 'Team A'} vs ${m.teamB?.name || 'Team B'}`;
    document.getElementById('detail-scores').textContent = setScore(m);

    const meta = document.getElementById('detail-meta');
    meta.innerHTML = `
      <span>📍 ${esc(m.venue || 'Unknown venue')}</span>
      <span>🕐 ${formatDT(m.scheduledAt)}</span>
      <span>ID: ${esc(id)}</span>
    `;

    const btns = document.getElementById('detail-btns');
    btns.innerHTML = '';

    const status = matchStatus(m);
    if (status === 'not-started') {
      const b = mkDetailBtn('Start Match', 'btn-start', () => startMatch(id));
      btns.appendChild(b);
    } else if (status === 'in-progress') {
      const b = mkDetailBtn('Resume Match', 'btn-resume', () => resumeMatch(id));
      btns.appendChild(b);
    } else {
      const b = mkDetailBtn('Delete Match', 'btn-delete', () => deleteMatch(id));
      btns.appendChild(b);
    }

    document.getElementById('detail-panel').classList.add('show');
  }

  function mkDetailBtn(label, cls, fn) {
    const b = document.createElement('button');
    b.className = `detail-btn ${cls}`;
    b.textContent = label;
    b.onclick = fn;
    return b;
  }

  function closeDetail() {
    detailId = null;
    document.getElementById('detail-panel').classList.remove('show');
  }

  /* ── New Match dialog ────────────────────────────────────────────── */
  function openNewMatchDialog() {
    const now = new Date();
    // Format for datetime-local input (YYYY-MM-DDTHH:MM)
    const pad = n => String(n).padStart(2, '0');
    const local = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}T${pad(now.getHours())}:${pad(now.getMinutes())}`;
    document.getElementById('inp-time').value = local;
    document.getElementById('inp-venue').value  = 'Here';
    document.getElementById('inp-team-a').value = 'Team A';
    document.getElementById('inp-team-b').value = 'Team B';
    document.getElementById('dialog-new').classList.add('show');
    document.getElementById('inp-venue').focus();
  }

  function closeNewMatchDialog() {
    document.getElementById('dialog-new').classList.remove('show');
  }

  function createMatch() {
    const venue   = document.getElementById('inp-venue').value.trim() || 'Here';
    const teamA   = document.getElementById('inp-team-a').value.trim().toUpperCase() || 'TEAM A';
    const teamB   = document.getElementById('inp-team-b').value.trim().toUpperCase() || 'TEAM B';
    const timeVal = document.getElementById('inp-time').value;
    const scheduledAt = timeVal ? new Date(timeVal).toISOString() : new Date().toISOString();

    const id = `match_${Date.now()}_${Math.random().toString(36).slice(2,7)}`;

    const matchData = {
      id,
      venue,
      scheduledAt,
      started:    false,
      matchOver:  false,
      currentSet: 1,
      setHistory: [],
      serving:    'A',
      sidesSwapped: false,
      teamA: { name: teamA, score: 0, sets: 0 },
      teamB: { name: teamB, score: 0, sets: 0 },
    };

    backend.createMatch(matchData);
    closeNewMatchDialog();
  }

  /* ── Match lifecycle ─────────────────────────────────────────────── */
  function startMatch(id) {
    closeDetail();
    backend.updateMatch(id, { started: true });
    openScorer(id);
  }

  function resumeMatch(id) {
    closeDetail();
    openScorer(id);
  }

  function deleteMatch(id) {
    if (!confirm('Delete this match?')) return;
    backend.deleteMatch(id);
    closeDetail();
  }

  function openScorer(id) {
    activeId    = id;
    matchState  = allMatches[id] || {};
    overlayOpen = false;
    prevA = -1; prevB = -1;

    document.getElementById('view-list').classList.remove('active');
    document.getElementById('view-scorer').classList.add('active');

    renderScorer(matchState);
  }

  function pauseToList() {
    activeId   = null;
    matchState = null;
    document.getElementById('view-scorer').classList.remove('active');
    document.getElementById('view-list').classList.add('active');
    document.getElementById('overlay').classList.remove('show');
    overlayOpen = false;
    renderList();
  }

  /* ── Scorer rendering ────────────────────────────────────────────── */
  function renderScorer(s) {
    if (!s) return;

    const nameA = document.getElementById('name-a');
    const nameB = document.getElementById('name-b');
    if (nameA && nameA.tagName !== 'INPUT') {
      nameA.textContent = s.teamA?.name || 'TEAM A';
      nameA.setAttribute('aria-label', `${s.teamA?.name} — tap to edit name`);
    }
    if (nameB && nameB.tagName !== 'INPUT') {
      nameB.textContent = s.teamB?.name || 'TEAM B';
      nameB.setAttribute('aria-label', `${s.teamB?.name} — tap to edit name`);
    }

    updateScore('a', s.teamA?.score ?? 0);
    updateScore('b', s.teamB?.score ?? 0);

    const servingA = s.serving === 'A';
    document.getElementById('panel-a').className = 'team-panel a' + (servingA ? ' serving' : '');
    document.getElementById('panel-b').className = 'team-panel b' + (!servingA ? ' serving' : '');
    document.getElementById('court').classList.toggle('swapped', !!s.sidesSwapped);
    document.getElementById('set-num').textContent  = s.currentSet ?? 1;
    document.getElementById('target-label').textContent =
      (s.currentSet ?? 1) >= 5 ? 'Deciding set — first to 15' : 'First to 25 (win by 2)';

    renderScorerPips('sets-a', s.teamA?.sets ?? 0);
    renderScorerPips('sets-b', s.teamB?.sets ?? 0);

    const hist = s.setHistory || [];
    document.getElementById('hist-a').textContent = hist.map(h => h.a).join('  ') || '';
    document.getElementById('hist-b').textContent = hist.map(h => h.b).join('  ') || '';

    if (s.matchOver && !overlayOpen) {
      const winner = (s.teamA?.sets ?? 0) >= SETS_TO_WIN ? s.teamA.name : s.teamB.name;
      showOverlay('🏆 Match Won!', winner, '', true);
    }
  }

  function updateScore(team, val) {
    const el   = document.getElementById('score-' + team);
    const prev = team === 'a' ? prevA : prevB;
    if (val !== prev) {
      el.classList.remove('bump'); void el.offsetWidth; el.classList.add('bump');
      if (team === 'a') prevA = val; else prevB = val;
    }
    el.textContent = val;
  }

  function renderScorerPips(id, filled) {
    const el = document.getElementById(id);
    el.innerHTML = '';
    for (let i = 0; i < SETS_TO_WIN; i++) {
      const pip = document.createElement('div');
      pip.className = 'set-pip-dot' + (i < filled ? ' won' : '');
      el.appendChild(pip);
    }
  }

  /* ── Scoring actions ─────────────────────────────────────────────── */
  function addPoint(team) {
    if (!matchState || matchState.matchOver || overlayOpen) return;
    const key      = 'team' + team;
    const otherKey = 'team' + (team === 'A' ? 'B' : 'A');
    const newScore = (matchState[key]?.score || 0) + 1;
    const otherSc  = matchState[otherKey]?.score || 0;
    const target   = (matchState.currentSet ?? 1) >= 5 ? 15 : 25;
    const patch    = { [`${key}/score`]: newScore, serving: team };

    if (newScore >= target && (newScore - otherSc) >= 2) {
      const newSets  = (matchState[key]?.sets || 0) + 1;
      const matchWon = newSets >= SETS_TO_WIN;
      const newHist  = [...(matchState.setHistory || []), {
        a: team === 'A' ? newScore : otherSc,
        b: team === 'B' ? newScore : otherSc
      }];
      patch[`${key}/sets`] = newSets;
      patch['matchOver']   = matchWon;
      patch['setHistory']  = newHist;
      if (matchWon) patch['started'] = true;
      const score = team === 'A' ? `${newScore} – ${otherSc}` : `${otherSc} – ${newScore}`;
      setTimeout(() => showOverlay(
        matchWon ? '🏆 Match Won!' : `Set ${matchState.currentSet} Won!`,
        matchState[key].name, score, matchWon
      ), 250);
    }
    backend.updateMatch(activeId, patch);
  }

  function removePoint(team) {
    if (!matchState) return;
    const key = 'team' + team;
    backend.updateMatch(activeId, { [`${key}/score`]: Math.max(0, (matchState[key]?.score || 0) - 1) });
  }

  function editName(team) {
    const nameEl = document.getElementById('name-' + team.toLowerCase());
    if (nameEl.tagName === 'INPUT') return;
    const current = matchState['team' + team]?.name || 'TEAM ' + team;

    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'name-input';
    input.value = current;
    input.maxLength = 20;
    nameEl.replaceWith(input);
    input.select();

    function commit() {
      const val = input.value.trim().toUpperCase() || current;
      if (val !== current) backend.updateMatch(activeId, { [`team${team}/name`]: val });
      const btn = document.createElement('button');
      btn.className = 'team-name-lbl';
      btn.id = 'name-' + team.toLowerCase();
      btn.textContent = val;
      btn.onclick = () => editName(team);
      input.replaceWith(btn);
    }

    input.addEventListener('blur', commit);
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter')  { e.preventDefault(); input.blur(); }
      if (e.key === 'Escape') { input.value = current; input.blur(); }
    });
  }

  function swapTeams() {
    if (!matchState) return;
    backend.updateMatch(activeId, { sidesSwapped: !matchState.sidesSwapped });
    showToast('Teams swapped');
  }

  function nextSet() {
    if (!matchState) return;
    backend.updateMatch(activeId, {
      'teamA/score': 0, 'teamB/score': 0,
      currentSet: (matchState.currentSet || 1) + 1,
      matchOver: false
    });
    dismissOverlay();
    prevA = 0; prevB = 0;
  }

  function endMatch() {
    if (!matchState) return;
    if (!confirm('End and finalize this match?')) return;
    backend.updateMatch(activeId, { matchOver: true });
    pauseToList();
  }

  /* ── Overlay ─────────────────────────────────────────────────────── */
  function showOverlay(label, winner, score, isMatch) {
    overlayOpen = true;
    document.getElementById('ov-label').textContent  = label;
    document.getElementById('ov-winner').textContent = winner;
    document.getElementById('ov-score').textContent  = score;
    const btn = document.getElementById('ov-btn');
    btn.textContent = isMatch ? 'Back to List' : 'Next Set →';
    btn.onclick     = isMatch ? pauseToList : nextSet;
    document.getElementById('overlay').classList.add('show');
    btn.focus();
  }

  function dismissOverlay() {
    overlayOpen = false;
    document.getElementById('overlay').classList.remove('show');
  }

  /* ── Toast ───────────────────────────────────────────────────────── */
  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
  }
  </script>
</body>
</html>
