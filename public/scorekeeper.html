<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏐 Scorekeeper</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0c0c10;
      --surface:  #16161c;
      --surface2: #222230;
      --border:   #2e2e3e;
      --a:        #ff4f1f;
      --b:        #00c2d1;
      --text:     #efefef;
      --muted:    #8888a8;
    }

    html, body {
      height: 100dvh;
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Sans', sans-serif;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    body { display: flex; flex-direction: column; }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .set-badge { font-size: 12px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
    .set-badge span { color: var(--text); }
    .target-info { font-size: 11px; color: var(--muted); }
    .hdr-btn {
      background: var(--surface2); border: 1px solid var(--border); color: var(--muted);
      padding: 5px 11px; border-radius: 6px; font-size: 11px; font-weight: 600;
      letter-spacing: 0.06em; font-family: inherit; cursor: pointer;
    }

    /* Court */
    .court { flex: 1; display: flex; overflow: hidden; }
    .court.swapped { flex-direction: row-reverse; }

    .team-panel {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      padding: 14px 10px 10px; gap: 10px; position: relative; transition: background 0.3s;
    }
    .team-panel::after {
      content: ''; position: absolute; top: 0; left: 0; right: 0;
      height: 3px; opacity: 0; transition: opacity 0.3s;
    }
    /* border always on the left panel (first in visual order) */
    .team-panel.a               { border-right: 1px solid var(--border); border-left: none; }
    .court.swapped .team-panel.a { border-right: none; border-left: 1px solid var(--border); }
    .team-panel.a::after { background: var(--a); }
    .team-panel.b::after { background: var(--b); }
    .team-panel.serving::after { opacity: 1; }
    .team-panel.serving { background: rgba(255,255,255,0.015); }

    .name-row { display: flex; align-items: center; gap: 7px; }
    .serve-pip { width: 7px; height: 7px; border-radius: 50%; opacity: 0; transition: opacity 0.3s; flex-shrink: 0; }
    .serving .serve-pip { opacity: 1; }
    .team-panel.a .serve-pip { background: var(--a); }
    .team-panel.b .serve-pip { background: var(--b); }

    .team-name {
      font-size: 13px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
      cursor: pointer; border-bottom: 1px dashed transparent; transition: border-color 0.2s;
      background: none; border-top: none; border-left: none; border-right: none;
      padding: 0; font-family: inherit;
    }
    .team-panel.a .team-name { color: var(--a); }
    .team-panel.b .team-name { color: var(--b); }
    .team-name:hover { border-bottom-color: currentColor; }
    .team-name:focus-visible { outline: 2px solid currentColor; outline-offset: 3px; border-radius: 2px; }

    .sr-only {
      position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0;
    }

    .name-input {
      font-size: 13px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
      font-family: 'IBM Plex Sans', sans-serif; background: transparent;
      border: none; border-bottom: 2px solid currentColor; outline: none;
      width: 90px; text-align: center; padding: 0 2px;
    }
    .team-panel.a .name-input { color: var(--a); }
    .team-panel.b .name-input { color: var(--b); }

    .score-num {
      font-family: 'IBM Plex Mono', monospace;
      font-size: clamp(72px, 18vw, 96px);
      font-weight: 700; line-height: 1; color: var(--text);
    }
    .score-num.bump { animation: bump 0.22s ease; }
    @keyframes bump {
      0%  { transform: scale(1); }
      45% { transform: scale(1.14); }
      100%{ transform: scale(1); }
    }

    .btn-plus {
      width: 100%; flex: 1; border: none; border-radius: 14px; font-size: 40px; font-weight: 700;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: transform 0.1s, opacity 0.1s; user-select: none;
    }
    .team-panel.a .btn-plus { background: var(--a); color: #fff; }
    .team-panel.b .btn-plus { background: var(--b); color: #fff; }
    .btn-plus:active { transform: scale(0.95); opacity: 0.8; }

    .btn-minus {
      width: 100%; padding: 11px; border: 1px solid var(--border); border-radius: 10px;
      background: var(--surface); color: var(--muted); font-size: 20px; cursor: pointer;
      font-family: inherit; transition: background 0.15s, color 0.15s; user-select: none;
    }
    .btn-minus:active { background: var(--surface2); color: var(--text); }

    .sets-row { display: flex; gap: 5px; }
    .set-pip { width: 9px; height: 9px; border-radius: 50%; background: var(--border); transition: background 0.3s; }
    .team-panel.a .set-pip.won { background: var(--a); }
    .team-panel.b .set-pip.won { background: var(--b); }

    .set-hist { font-size: 10px; color: var(--muted); letter-spacing: 0.06em; min-height: 14px; }

    /* Footer */
    .footer {
      display: flex; gap: 8px; padding: 10px 12px;
      background: var(--surface); border-top: 1px solid var(--border); flex-shrink: 0;
    }
    .footer-btn {
      flex: 1; padding: 13px; border-radius: 10px; font-size: 12px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase; font-family: inherit;
      cursor: pointer; border: 1px solid var(--border); transition: opacity 0.15s;
    }
    .footer-btn:active { opacity: 0.7; }
    .btn-next-set { background: var(--surface2); color: var(--text); }
    .btn-swap     { background: transparent; color: var(--muted); flex: 0.6; }
    .btn-reset    { background: transparent; color: var(--muted); }

    /* Toast */
    .toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      background: var(--surface2); border: 1px solid var(--border); color: var(--text);
      padding: 9px 18px; border-radius: 8px; font-size: 13px; font-weight: 500;
      opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; z-index: 50;
    }
    .toast.show { opacity: 1; }

    /* Overlay */
    .overlay {
      position: fixed; inset: 0; background: rgba(8,8,14,0.92);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 10px; z-index: 100; opacity: 0; pointer-events: none;
      transition: opacity 0.4s; backdrop-filter: blur(4px);
    }
    .overlay.show { opacity: 1; pointer-events: all; }
    .ov-label  { font-size: 11px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); }
    .ov-winner { font-size: 32px; font-weight: 700; letter-spacing: 0.05em; text-align: center; }
    .ov-score  { font-family: 'IBM Plex Mono', monospace; font-size: 18px; color: var(--muted); }
    .ov-btn {
      margin-top: 16px; padding: 14px 36px; border-radius: 12px;
      background: var(--surface2); border: 1px solid var(--border); color: var(--text);
      font-size: 13px; font-weight: 700; font-family: inherit;
      letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer;
    }

    /* Connection dot */
    .conn-dot { width: 6px; height: 6px; border-radius: 50%; background: #444; transition: background 0.4s; }
    .conn-dot.live { background: #2ecc71; }
  </style>
</head>

      </div>

    <div class="team-panel b" id="panel-b">
      <div class="name-row">
        <div class="serve-pip" aria-hidden="true"></div>
        <span class="sr-only" id="serve-b"></span>

      </div>

  <script src="js/firebase-config.js"></script>
  <script src="js/backend.js"></script>
  <script>
  const SETS_TO_WIN = 3;

  let state       = null;
  let overlayOpen = false;
  let toastTimer  = null;
  let prevA = -1, prevB = -1;

  window.addEventListener('backend:ready', () => {
    backend.onConnect(() => {
      const dot = document.getElementById('conn-dot');
      dot.classList.add('live');
      dot.setAttribute('aria-label', 'Connected');
    });
    backend.onDisconnect(() => {
      const dot = document.getElementById('conn-dot');
      dot.classList.remove('live');
      dot.setAttribute('aria-label', 'Disconnected');
    });
    backend.onState(data => {
      if (!data) { backend.replace(freshState()); return; }
      state = data;
      render(state);
    });
  });

  function freshState() {
    return {
      teamA: { name: 'TEAM A', score: 0, sets: 0 },
      teamB: { name: 'TEAM B', score: 0, sets: 0 },
      serving: 'A', currentSet: 1, setHistory: [], matchOver: false,
      sidesSwapped: false
    };
  }

  function render(s) {
    const nameA = document.getElementById('name-a');
    const nameB = document.getElementById('name-b');
    if (nameA && nameA.tagName !== 'INPUT') {
      nameA.textContent = s.teamA.name;
      nameA.setAttribute('aria-label', `${s.teamA.name} — tap to edit name`);
    }
    if (nameB && nameB.tagName !== 'INPUT') {
      nameB.textContent = s.teamB.name;
      nameB.setAttribute('aria-label', `${s.teamB.name} — tap to edit name`);
    }
    updateScore('a', s.teamA.score);
    updateScore('b', s.teamB.score);
    document.getElementById('score-a').setAttribute('aria-label', `${s.teamA.name} score: ${s.teamA.score}`);
    document.getElementById('score-b').setAttribute('aria-label', `${s.teamB.name} score: ${s.teamB.score}`);
    document.querySelector('#panel-a .btn-plus').setAttribute('aria-label',  `Add point for ${s.teamA.name}`);
    document.querySelector('#panel-a .btn-minus').setAttribute('aria-label', `Remove point from ${s.teamA.name}`);
    document.querySelector('#panel-b .btn-plus').setAttribute('aria-label',  `Add point for ${s.teamB.name}`);
    document.querySelector('#panel-b .btn-minus').setAttribute('aria-label', `Remove point from ${s.teamB.name}`);
    const servingA = s.serving === 'A';
    document.getElementById('panel-a').className = 'team-panel a' + (servingA ? ' serving' : '');
    document.getElementById('panel-b').className = 'team-panel b' + (!servingA ? ' serving' : '');
    document.getElementById('serve-a').textContent = servingA ? '(serving)' : '';
    document.getElementById('serve-b').textContent = !servingA ? '(serving)' : '';
    document.getElementById('court').classList.toggle('swapped', !!s.sidesSwapped);
    document.getElementById('set-num').textContent      = s.currentSet;
    document.getElementById('target-label').textContent =
      s.currentSet >= 5 ? 'Deciding set — first to 15' : 'First to 25 (win by 2)';
    renderPips('sets-a', s.teamA.sets, s.teamA.name);
    renderPips('sets-b', s.teamB.sets, s.teamB.name);
    const hist = s.setHistory || [];
    document.getElementById('hist-a').textContent = hist.map(h => h.a).join('  ') || '';
    document.getElementById('hist-b').textContent = hist.map(h => h.b).join('  ') || '';
    if (s.matchOver && !overlayOpen) {
      const winner = s.teamA.sets >= SETS_TO_WIN ? s.teamA.name : s.teamB.name;
      showOverlay('🏆 Match Won!', winner, '', true);
    }
  }

  function updateScore(team, val) {
    const el = document.getElementById('score-' + team);
    const prev = team === 'a' ? prevA : prevB;
    if (val !== prev) {
      el.classList.remove('bump'); void el.offsetWidth; el.classList.add('bump');
      if (team === 'a') prevA = val; else prevB = val;
    }
    el.textContent = val;
  }

  function renderPips(id, filled, teamName) {
    const el = document.getElementById(id);
    el.setAttribute('aria-label', `${teamName} sets won: ${filled}`);
    el.innerHTML = '';
    for (let i = 0; i < SETS_TO_WIN; i++) {
      const pip = document.createElement('div');
      pip.className = 'set-pip' + (i < filled ? ' won' : '');
      pip.setAttribute('aria-hidden', 'true');
      el.appendChild(pip);
    }
  }

  function addPoint(team) {
    if (!state || state.matchOver || overlayOpen) return;
    const key      = 'team' + team;
    const otherKey = 'team' + (team === 'A' ? 'B' : 'A');
    const newScore = (state[key].score || 0) + 1;
    const otherSc  = state[otherKey].score || 0;
    const target   = state.currentSet >= 5 ? 15 : 25;
    const patch    = { [`${key}/score`]: newScore, serving: team };

    if (newScore >= target && (newScore - otherSc) >= 2) {
      const newSets  = (state[key].sets || 0) + 1;
      const matchWon = newSets >= SETS_TO_WIN;
      const newHist  = [...(state.setHistory || []), {
        a: team === 'A' ? newScore : otherSc,
        b: team === 'B' ? newScore : otherSc
      }];
      patch[`${key}/sets`] = newSets;
      patch['matchOver']   = matchWon;
      patch['setHistory']  = newHist;
      const score = team === 'A' ? `${newScore} – ${otherSc}` : `${otherSc} – ${newScore}`;
      setTimeout(() => showOverlay(
        matchWon ? '🏆 Match Won!' : `Set ${state.currentSet} Won!`,
        state[key].name, score, matchWon
      ), 250);
    }
    backend.update(patch);
  }

  function removePoint(team) {
    if (!state) return;
    const key = 'team' + team;
    backend.update({ [`${key}/score`]: Math.max(0, (state[key].score || 0) - 1) });
  }

  function toggleServe() {
    if (!state) return;
    backend.update({ serving: state.serving === 'A' ? 'B' : 'A' });
    showToast('Serve switched');
  }

  function editName(team) {
    const nameEl = document.getElementById('name-' + team.toLowerCase());
    if (nameEl.tagName === 'INPUT') return; // already editing
    const current = state['team' + team].name;

    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'name-input';
    input.value = current;
    input.maxLength = 20;
    input.setAttribute('aria-label', `Team ${team} name`);
    nameEl.replaceWith(input);
    input.select();

    function commit() {
      const val = input.value.trim().toUpperCase() || current;
      if (val !== current) backend.update({ [`team${team}/name`]: val });
      const span = document.createElement('div');
      span.className = 'team-name';
      span.id = 'name-' + team.toLowerCase();
      span.textContent = val;
      span.onclick = () => editName(team);
      input.replaceWith(span);
    }

    input.addEventListener('blur', commit);
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
      if (e.key === 'Escape') { input.value = current; input.blur(); }
    });
  }

  function swapTeams() {
    if (!state) return;
    backend.update({ sidesSwapped: !state.sidesSwapped });
    showToast('Teams swapped');
  }

  function nextSet() {
    if (!state) return;
    backend.update({ 'teamA/score': 0, 'teamB/score': 0, currentSet: (state.currentSet || 1) + 1, matchOver: false });
    dismissOverlay();
    prevA = 0; prevB = 0;
  }

  function resetMatch() {
    if (!confirm('Reset the entire match?')) return;
    backend.replace(freshState());
    dismissOverlay();
    prevA = 0; prevB = 0;
  }

  function showOverlay(label, winner, score, isMatch) {
    overlayOpen = true;
    document.getElementById('ov-label').textContent  = label;
    document.getElementById('ov-winner').textContent = winner;
    document.getElementById('ov-score').textContent  = score;
    const btn = document.getElementById('ov-btn');
    btn.textContent = isMatch ? 'New Match' : 'Next Set →';
    btn.onclick     = isMatch ? () => resetMatch() : () => nextSet();
    document.getElementById('overlay').classList.add('show');
    btn.focus();
  }

  function dismissOverlay() {
    overlayOpen = false;
    document.getElementById('overlay').classList.remove('show');
    document.querySelector('#panel-a .btn-plus')?.focus();
  }

  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
  }
  </script>
</body>
</html>
